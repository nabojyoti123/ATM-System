<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>ATM System</title>
  </head>
  <body>
    <!--A generic container used to group elements.need a box around the ATM-->
    <div id="atm">
      <!--heading for atm system-->
      <h1>ATM System</h1>
      <!--paragraph for Balance $5000-->
      <p id="balance">Balance: ₹5000</p>
      <input type="number" id="amount" placeholder="Enter amount" />
      <!--for deposit-->
      <button id="depositBtn">Deposit</button>
      <button id="withdrawBtn">Withdraw</button>
      <button id="checkBtn">Check Balance</button>
      <button id="exitBtn">Exit</button>
      <p id="result">Result Message Here</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
